<div class="game-menu">

  
  <header class="gm-header">
    <button class="gm-header__back" routerLink="/game-mode-selection" title="Retour">
      <img src="assets/arrow.svg" alt="retour">
    </button>
    <div class="gm-header__center">
      <span class="gm-header__eyebrow">Terra Numerica</span>
      <h1 class="gm-header__title">Jeu libre</h1>
    </div>
    <button class="gm-header__rules" (click)="displayRules()">Règles</button>
  </header>

  
  <main class="gm-body">

    
    <section class="gm-col gm-col--graph">
      <div class="section-card">
        <h2 class="section-card__title">
          <span class="section-card__num">01</span>Plateau de jeu
        </h2>

        <div class="topology-grid">
          <button class="topo-tile"
            *ngFor="let type of availableGraphType"
            (click)="selectGraphType(type)"
            [class.is-selected]="isSelectedGraphType(type) === 'selected'">
            <img class="topo-tile__img" src="assets/menu/graph-img/{{type}}.svg" [alt]="translator.graphTypeName(type)">
            <span class="topo-tile__label">{{ translator.graphTypeName(type) }}</span>
          </button>

          
          <label class="topo-tile topo-tile--import"
            [class.is-selected]="isSelectedGraphType('import') === 'selected'"
            (click)="selectGraphType('import')">
            <input id="graph-file-input" name="graph-file-input" class="sr-only" type="file"
              accept="application/json" (change)="onFileChange($event.target.files[0])">
            <span class="topo-tile__icon">↑</span>
            <span class="topo-tile__label">{{ selectedFileName || 'Importer un graphe' }}</span>
          </label>
        </div>

        
        <div *ngIf="paramsNames.length > 0" class="extra-params">
          <h3 class="extra-params__title">Paramètres</h3>
          <div class="param-row" *ngIf="paramsNames.length > 0">
            <label class="param-row__label">{{ paramsNames[0] }}</label>
            <div class="param-row__controls">
              <button class="stepper-btn" (click)="updateNumberFieldValue('graphParam1', config, update_action.decrease)">−</button>
              <input #param1Input [(ngModel)]="config['graphParam1']"
                [min]="paramsBoundaries[selectedGraphType].param1"
                (blur)="onBlur($event)" id="param1" type="number" name="param1" class="stepper-input">
              <button class="stepper-btn" (click)="updateNumberFieldValue('graphParam1', config, update_action.increase)">+</button>
            </div>
          </div>
          <div class="param-row" *ngIf="paramsNames.length > 1">
            <label class="param-row__label">{{ paramsNames[1] }}</label>
            <div class="param-row__controls">
              <button class="stepper-btn" (click)="updateNumberFieldValue('graphParam2', config, update_action.decrease)">−</button>
              <input #param2Input [(ngModel)]="config['graphParam2']"
                [min]="paramsBoundaries[selectedGraphType].param2"
                (blur)="onBlur($event)" id="param2" type="number" name="param2" class="stepper-input">
              <button class="stepper-btn" (click)="updateNumberFieldValue('graphParam2', config, update_action.increase)">+</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    
    <section class="gm-col gm-col--options">

      
      <div class="section-card">
        <h2 class="section-card__title">
          <span class="section-card__num">02</span>Adversaire
        </h2>
        <div class="option-tiles">
          <button class="option-tile"
            *ngFor="let type of availableOpponentType"
            (click)="selectPlayer(type)"
            [class.is-selected]="isSelectedOponent(type) === 'selected'">
            <img class="option-tile__img" src="assets/menu/opponent-type/vs_{{type}}.svg" [alt]="translator.opponentTypeName(type)">
            <span class="option-tile__label">{{ translator.opponentTypeName(type) }}</span>
          </button>
        </div>

        
        <div class="ai-camp" *ngIf="selectedOpponentType === 'ai'">
          <h3 class="ai-camp__label">Votre camp</h3>
          <div class="camp-tiles">
            <button class="camp-tile" (click)="setSelectedAi('cops')"
              [class.is-selected]="isSelectedCopsAi() === 'selected'">
              <img src="assets/menu/opponent-type/thief.svg" alt="Voleur">
              <span>Voleur</span>
            </button>
            <button class="camp-tile" (click)="setSelectedAi('thief')"
              [class.is-selected]="isSelectedThiefAi() === 'selected'">
              <img src="assets/menu/opponent-type/police.svg" alt="Gendarme">
              <span>Gendarme</span>
            </button>
          </div>
        </div>
      </div>

      
      <div class="section-card section-card--row">
        <div class="mini-section">
          <h2 class="section-card__title">
            <span class="section-card__num">03</span>Policiers
          </h2>
          <div class="param-row__controls">
            <button class="stepper-btn" (click)="updateNumberFieldValue('copsNumber', config, update_action.decrease)">−</button>
            <input #copsNumberInput [(ngModel)]="config['copsNumber']" min="1" [max]="getMaxCopsNumber()"
              (blur)="onBlur($event)" id="copsNum" type="number" name="cops" class="stepper-input stepper-input--lg">
            <button class="stepper-btn" (click)="updateNumberFieldValue('copsNumber', config, update_action.increase)">+</button>
          </div>
        </div>

        <div class="mini-section-divider"></div>

        <div class="mini-section">
          <h2 class="section-card__title">
            <span class="section-card__num">04</span>Vitesse du voleur
          </h2>
          <div class="param-row__controls">
            <button class="stepper-btn" (click)="updateNumberFieldValue('thiefSpeed', config, update_action.decrease)">−</button>
            <input type="number" [(ngModel)]="config['thiefSpeed']" (blur)="onBlur($event)" min="1" id="thiefSpeed"
              name="thiefSpeed" class="stepper-input stepper-input--lg">
            <button class="stepper-btn" (click)="updateNumberFieldValue('thiefSpeed', config, update_action.increase)">+</button>
          </div>
        </div>
      </div>

      
      <div class="section-card">
        <h2 class="section-card__title">
          <span class="section-card__num">05</span>Difficulté
        </h2>
        <div class="diff-tiles">
          <button class="diff-tile diff-tile--easy"   [class.is-selected]="isSelectedEasy()   === 'selected'" (click)="gameModeSelected = 'easy'">
            <span class="diff-tile__label">Facile</span>
            <input [(ngModel)]="gameModeSelected" type="radio" id="mode1" name="mode" value="easy" class="sr-only">
          </button>
          <button class="diff-tile diff-tile--normal" [class.is-selected]="isSelectedMedium() === 'selected'" (click)="gameModeSelected = 'medium'">
            <span class="diff-tile__label">Normal</span>
            <input [(ngModel)]="gameModeSelected" type="radio" id="mode2" name="mode" value="medium" class="sr-only">
          </button>
          <button class="diff-tile diff-tile--hard"   [class.is-selected]="isSelectedHard()   === 'selected'" (click)="gameModeSelected = 'hard'">
            <span class="diff-tile__label">Difficile</span>
            <input [(ngModel)]="gameModeSelected" type="radio" id="mode3" name="mode" value="hard" class="sr-only">
          </button>
          <button class="diff-tile diff-tile--extreme" [class.is-selected]="isSelectedExtreme() === 'selected'" (click)="gameModeSelected = 'extreme'">
            <span class="diff-tile__label">Extrême</span>
            <input [(ngModel)]="gameModeSelected" type="radio" id="mode4" name="mode" value="extreme" class="sr-only">
          </button>
        </div>
      </div>

    </section>
  </main>

  
  <div class="gm-footer">
    <button class="start-btn" [disabled]="checkGraphParamIssues()" (click)="validateParams()">
      <span class="start-btn__label">Commencer la partie</span>
      <span class="start-btn__arrow">→</span>
    </button>
  </div>

</div>
