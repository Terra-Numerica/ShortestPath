<div class="editor-page">
  <div #canvas id="canvas" class="editor-canvas"></div>

  <div class="top-bar">
    <div class="top-buttons">
      <button class="top-button" routerLink="/game-mode-selection">
        <span class="top-icon">⌂</span>
        <span class="top-text">MENU</span>
      </button>

      <button class="top-button" (click)="resetGraphEdition()">
        <span class="top-icon">⟲</span>
        <span class="top-text">RESET</span>
      </button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="tool-buttons">
      <button
        *ngFor="let tool of tools"
        class="tool-button"
        [class.active]="selected_tool === tool"
        (click)="selectTool(tool)"
      >
        {{ getToolName(tool) }}
      </button>

      <button class="tool-button save-button" (click)="saveGraph()">
        Enregistrer
      </button>
    </div>
  </div>
</div>
